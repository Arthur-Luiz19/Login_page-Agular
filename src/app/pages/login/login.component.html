<app-default-login-layout 
  title="Login into your account"
  primaryBtnText="Login Now"
  secundaryBtnText="Signup Now" 
  (submit)="submit()"
  (navigate)="navigate()"
  [disabledPrimaryBtn]="!loginForm.valid"
>
<form [formGroup]="loginForm">
  <app-primary-input formControlName="email" inputName="email" label="Email" placeholder="Email" type="email">
    <img src="/assets/svg/email.svg" />
  </app-primary-input>

  <app-primary-input formControlName="password" inputName="password" label="Password" placeholder="Password" type="password">
    <img src="/assets/svg/password.svg" />
  </app-primary-input>
  <span>Forgot Password?</span>
</form>
</app-default-login-layout>
