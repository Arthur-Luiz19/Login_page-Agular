<app-default-login-layout 
  title="Sign up for your account"
  primaryBtnText="Sign Up"
  secundaryBtnText="Already have an account?" 
  (submit)="submit()"
  (navigate)="navigate()"
  [disabledPrimaryBtn]="!signupForm.valid"
>
<form [formGroup]="signupForm">
  <app-primary-input formControlName="name" inputName="name" label="Name" placeholder="Name" type="text">
    <img src="/assets/svg/email.svg" />
  </app-primary-input>

  <app-primary-input formControlName="email" inputName="email" label="Email" placeholder="Email" type="email">
    <img src="/assets/svg/email.svg" />
  </app-primary-input>

  <app-primary-input formControlName="password" inputName="password" label="Password" placeholder="Password" type="password">
    <img src="/assets/svg/password.svg" />
  </app-primary-input>

  <app-primary-input formControlName="passwordConfirm" inputName="passwordConfirm" label="Confirm Password" placeholder="Confirm Password" type="password">
    <img src="/assets/svg/password.svg" />
  </app-primary-input>

  <span>Forgot Password?</span>
</form>
</app-default-login-layout>
